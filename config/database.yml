# config/database.yml

# ===== Dev/Test: SQLite =====
sqlite_defaults: &sqlite_defaults
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *sqlite_defaults
  database: storage/development.sqlite3

test:
  <<: *sqlite_defaults
  database: storage/test.sqlite3


# ===== Producción: PostgreSQL =====
# Usa DATABASE_URL inyectada por tu proveedor (Render/Fly/etc.)
pg_defaults: &pg_defaults
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Opcional:
  # variables:
  #   statement_timeout: 5000

production:
  primary:
    <<: *pg_defaults
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *pg_defaults
    url: <%= ENV.fetch("CACHE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cache_migrate

  queue:
    <<: *pg_defaults
    url: <%= ENV.fetch("QUEUE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/queue_migrate

  cable:
    <<: *pg_defaults
    url: <%= ENV.fetch("CABLE_DATABASE_URL", ENV["DATABASE_URL"]) %>
    migrations_paths: db/cable_migrate
